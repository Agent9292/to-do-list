<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Smart To-Do App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-check-circle"></i> Smart To-Do List</h1>
            <p class="subtitle">Organize your tasks efficiently</p>
        </header>

        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="taskInput" placeholder="Enter your task..." autocomplete="off">
                <select id="prioritySelect">
                    <option value="low">🟢 Low Priority</option>
                    <option value="medium" selected>🟡 Medium Priority</option>
                    <option value="high">🔴 High Priority</option>
                </select>
            </div>
            <button onclick="addTask()" id="addBtn">
                <i class="fas fa-plus"></i> Add Task
            </button>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <span class="stat-label">Total Tasks</span>
                <span class="stat-value" id="totalTasks">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Completed</span>
                <span class="stat-value" id="completedTasks">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Pending</span>
                <span class="stat-value" id="pendingTasks">0</span>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all')">All</button>
            <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
            <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
        </div>

        <div class="tasks-container">
            <ul id="taskList"></ul>
            <div id="emptyState" class="empty-state">
                <i class="fas fa-clipboard-list"></i>
                <p>No tasks yet! Add your first task above.</p>
            </div>
        </div>

        <div class="actions">
            <button onclick="deleteAllTasks()" class="danger-btn" id="clearAllBtn">
                <i class="fas fa-trash"></i> Clear All
            </button>
            <button onclick="saveTasks()" class="success-btn">
                <i class="fas fa-save"></i> Save to Local Storage
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
